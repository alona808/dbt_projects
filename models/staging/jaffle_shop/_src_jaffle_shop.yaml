sources:
  - name: jaffle_shop
    description: A clone of a Postgres database
    database: dbt-tutorial  # The remote project
    schema: jaffle_shop
    tables:
      - name: customers
        description: Raw customers data
        columns:
          - name: id
            description: The primary key for customers
            tests:
              - unique
              - not_null
      - name: orders
        columns:
          - name: id
            tests:
              - unique
              - not_null
        config:
          freshness:
            warn_after:
              count: 24
              period: hour
            error_after:
              count: 48
              period: hour

          loaded_at_field: _etl_loaded_at

